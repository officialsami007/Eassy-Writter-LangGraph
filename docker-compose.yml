version: "3.9"

services:
  essay-writer:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      # Persist essays.json and SQLite DB between container restarts
      - ./data:/app/data
    restart: unless-stopped